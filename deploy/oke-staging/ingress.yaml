apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ott-ingress
  namespace: ott-staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts:
        - staging.ottline.app
      secretName: staging-ottline-app-tls
  rules:
    - host: staging.ottline.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ott-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ott-web
                port:
                  number: 3000
