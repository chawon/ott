name: Native iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or SHA to build"
        required: true
        type: string
      message:
        description: "EAS build message"
        required: false
        type: string

permissions:
  contents: read

jobs:
  testflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify TestFlight configuration
        run: npm run native:testflight:check

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Typecheck native app
        run: npm run native:typecheck

      - name: Test native app
        run: npm run native:test

      - name: Build and submit to TestFlight
        working-directory: apps/native
        run: >
          eas build
          --platform ios
          --profile testflight
          --non-interactive
          --auto-submit
          --message "${{ inputs.message || github.sha }}"

      - name: Summary
        if: always()
        run: |
          echo "### Native iOS TestFlight" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: ${{ inputs.ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- EAS dashboard: https://expo.dev/accounts" >> "$GITHUB_STEP_SUMMARY"
