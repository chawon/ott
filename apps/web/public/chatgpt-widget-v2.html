<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1"
    />
    <title>ottline ChatGPT widget</title>
    <style>
      :root {
        color-scheme: light;
        --bg: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
        --card: rgba(255, 255, 255, 0.9);
        --border: rgba(148, 163, 184, 0.24);
        --ink: #0f172a;
        --muted: #475569;
        --brand: #1e4d8c;
        --brand-soft: #e0efff;
        --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font:
          14px/1.5 "Pretendard Variable", Pretendard, "Poppins", system-ui,
          sans-serif;
      }

      button {
        font: inherit;
      }

      .shell {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .hero,
      .panel {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 18px;
        background:
          radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 25%),
          radial-gradient(circle at bottom left, rgba(30, 77, 140, 0.16), transparent 22%),
          rgba(255, 255, 255, 0.94);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 10px;
        background: var(--brand-soft);
        color: var(--brand);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p,
      label {
        margin: 0;
      }

      h1 {
        margin-top: 10px;
        font-size: 24px;
        line-height: 1.15;
      }

      .hero-copy {
        margin-top: 10px;
        color: var(--muted);
      }

      .status {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.04);
        color: var(--muted);
      }

      .grid {
        display: grid;
        gap: 14px;
      }

      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel {
        padding: 16px;
      }

      .panel h2 {
        font-size: 15px;
      }

      .panel-copy {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .toolbar,
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar {
        margin-top: 14px;
      }

      .actions {
        margin-top: 12px;
      }

      .pill,
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        border-radius: 999px;
        border: 1px solid transparent;
        min-height: 40px;
        padding: 0 14px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.15s ease,
          background 0.15s ease;
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .button.primary {
        background: var(--brand);
        color: white;
      }

      .button.secondary {
        border-color: rgba(30, 77, 140, 0.18);
        background: rgba(30, 77, 140, 0.06);
        color: var(--brand);
      }

      .button.ghost {
        border-color: rgba(148, 163, 184, 0.2);
        background: white;
        color: var(--ink);
      }

      .list {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .item {
        display: grid;
        gap: 12px;
        grid-template-columns: 64px minmax(0, 1fr);
        align-items: start;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(255, 255, 255, 0.92);
        padding: 10px;
      }

      .poster {
        width: 64px;
        height: 92px;
        border-radius: 14px;
        object-fit: cover;
        background: linear-gradient(180deg, #dbeafe, #e2e8f0);
      }

      .meta {
        min-width: 0;
      }

      .meta h3 {
        font-size: 14px;
        line-height: 1.3;
      }

      .muted {
        color: var(--muted);
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .pill {
        min-height: 28px;
        background: rgba(30, 77, 140, 0.08);
        color: var(--brand);
        font-size: 11px;
        font-weight: 600;
      }

      .empty {
        margin-top: 14px;
        border: 1px dashed rgba(148, 163, 184, 0.4);
        border-radius: 18px;
        padding: 16px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 720px) {
        .grid.two {
          grid-template-columns: 1fr;
        }

        .stat-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <span class="eyebrow" data-i18n="hero.eyebrow"></span>
        <h1 data-i18n="hero.title"></h1>
        <p class="hero-copy" data-i18n="hero.copy"></p>
        <div class="status" id="status"></div>
        <div class="toolbar">
          <button class="button primary" id="load-timeline" type="button"></button>
          <button class="button secondary" id="load-movies" type="button"></button>
          <button class="button ghost" id="load-series" type="button"></button>
        </div>
      </section>

      <section class="grid">
        <article class="panel">
          <h2 data-i18n="timeline.title"></h2>
          <p class="panel-copy" data-i18n="timeline.copy"></p>
          <div id="recent-logs" class="list"></div>
        </article>
      </section>
    </div>

    <script type="module">
      const CONFIG = __OTTLINE_CHATGPT_CONFIG__;
      const state = {
        recentLogs: [],
      };

      const pendingRequests = new Map();
      let rpcId = 0;

      const statusEl = document.getElementById("status");
      const recentLogsEl = document.getElementById("recent-logs");

      const resolveLocale = () => {
        const preferred = Array.isArray(navigator.languages)
          ? navigator.languages
          : [navigator.language || CONFIG.defaultLocale];
        const joined = preferred.join(",").toLowerCase();
        return joined.includes("en") && !joined.includes("ko") ? "en" : "ko";
      };

      const locale = resolveLocale();
      const copy = CONFIG.i18n[locale] ?? CONFIG.i18n[CONFIG.defaultLocale];

      document.documentElement.lang = locale;
      document.title = copy.metaTitle;

      const applyStaticCopy = () => {
        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const path = element.getAttribute("data-i18n");
          const value = path.split(".").reduce((current, key) => current?.[key], copy);
          if (typeof value === "string") {
            element.textContent = value;
          }
        });
        document.getElementById("load-timeline").textContent = copy.actions.loadTimeline;
        document.getElementById("load-movies").textContent = copy.actions.loadMovies;
        document.getElementById("load-series").textContent = copy.actions.loadSeries;
      };

      const escapeHtml = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");

      const formatDate = (value, dateTime = false) => {
        if (!value) return "—";
        const date = new Date(value);
        return dateTime
          ? date.toLocaleString(locale)
          : date.toLocaleDateString(locale);
      };

      const labelFor = (group, value) => {
        if (!value) return "";
        return copy.enums[group]?.[value] ?? value;
      };

      const setStatus = (message) => {
        statusEl.textContent = message;
      };

      const rpcNotify = (method, params) => {
        window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      };

      const rpcRequest = (method, params) =>
        new Promise((resolve, reject) => {
          const id = ++rpcId;
          pendingRequests.set(id, { resolve, reject });
          window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
        });

      const ensureBridge = async () => {
        await rpcRequest("ui/initialize", {
          appInfo: { name: "ottline-chatgpt-widget", version: "0.1.0" },
          appCapabilities: {},
          protocolVersion: "2026-01-26",
        });
        rpcNotify("ui/notifications/initialized", {});
      };

      const bridgeReady = ensureBridge();

      const callTool = async (toolName, args = {}) => {
        await bridgeReady;
        return rpcRequest("tools/call", {
          name: toolName,
          arguments: args,
        });
      };

      const itemPoster = (posterUrl, alt) =>
        `<img class="poster" src="${escapeHtml(posterUrl || "")}" alt="${escapeHtml(alt)}" loading="lazy" />`;

      const renderEmpty = (target, message) => {
        target.innerHTML = `<div class="empty">${escapeHtml(message)}</div>`;
      };

      const renderRecentLogs = () => {
        if (!state.recentLogs.length) {
          renderEmpty(recentLogsEl, copy.timeline.empty);
          return;
        }

        recentLogsEl.innerHTML = state.recentLogs
          .map((item) => {
            const tags = [item.ott, labelFor("place", item.place), labelFor("occasion", item.occasion)]
              .filter(Boolean)
              .map((value) => `<span class="pill">${escapeHtml(value)}</span>`)
              .join("");

            const statusLine = [
              labelFor("status", item.status) || item.status || "LOG",
              formatDate(item.watchedAt),
            ]
              .filter(Boolean)
              .join(" · ");

            return `
              <article class="item">
                ${itemPoster(item.title?.posterUrl, item.title?.name || "Poster")}
                <div class="meta">
                  <h3>${escapeHtml(item.title?.name || "Untitled")}</h3>
                  <p class="muted">${escapeHtml(statusLine)}</p>
                  ${item.note ? `<p class="muted">${escapeHtml(item.note)}</p>` : ""}
                  <div class="tags">${tags}</div>
                </div>
              </article>
            `;
          })
          .join("");
      };

      const renderAll = () => {
        renderRecentLogs();
      };

      const applyStructuredContent = async (payload) => {
        if (!payload) return;

        if (payload.recentLogs) state.recentLogs = payload.recentLogs;
        if (payload.authRequired) {
          setStatus(copy.status.authRequired);
        }

        renderAll();
      };

      const applyToolResponse = (response) => {
        const message = response?.content?.find((item) => item.type === "text")?.text;
        if (message) {
          setStatus(message);
        }
        applyStructuredContent(response?.structuredContent);
      };

      window.addEventListener(
        "message",
        (event) => {
          if (event.source !== window.parent) return;
          const message = event.data;
          if (!message || message.jsonrpc !== "2.0") return;
          if (typeof message.id === "number") {
            const pending = pendingRequests.get(message.id);
            if (!pending) return;
            pendingRequests.delete(message.id);
            if (message.error) {
              pending.reject(message.error);
              return;
            }
            pending.resolve(message.result);
            return;
          }
          if (message.method === "ui/notifications/tool-result") {
            applyToolResponse(message.params);
          }
        },
        { passive: true },
      );

      document.getElementById("load-timeline").addEventListener("click", async () => {
        const response = await callTool(CONFIG.tools.listRecentLogs, {
          limit: 12,
          sort: "history",
        });
        applyToolResponse(response);
      });

      document.getElementById("load-movies").addEventListener("click", async () => {
        const response = await callTool(CONFIG.tools.listRecentLogs, {
          limit: 8,
          sort: "history",
          type: "movie",
        });
        applyToolResponse(response);
      });

      document.getElementById("load-series").addEventListener("click", async () => {
        const response = await callTool(CONFIG.tools.listRecentLogs, {
          limit: 8,
          sort: "history",
          type: "series",
        });
        applyToolResponse(response);
      });

      applyStaticCopy();
      setStatus(copy.status.signedOut);
      renderAll();
    </script>
  </body>
</html>
