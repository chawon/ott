name: Deploy Web to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA to deploy (must already be deployed to staging)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-push-web:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_PASSWORD }}

      - name: Build and push Web image (production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/ott-web:${{ inputs.sha }}

      - name: Update Production Web Manifest
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git checkout main

          ARCH=$(uname -m)
          if [[ "$ARCH" == "x86_64" ]]; then YQ_ARCH="amd64"; elif [[ "$ARCH" == "aarch64" || "$ARCH" == "arm64" ]]; then YQ_ARCH="arm64"; else YQ_ARCH="$ARCH"; fi
          wget https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_${YQ_ARCH} -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

          WEB_IMAGE="${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/ott-web:${{ inputs.sha }}"

          echo "Updating Production Web image to: $WEB_IMAGE"
          yq -i "select(.kind == \"Deployment\").spec.template.spec.containers[0].image = \"$WEB_IMAGE\"" deploy/oke/web-deployment.yaml

          if [[ -n $(git status -s) ]]; then
            git add deploy/oke/web-deployment.yaml
            git commit -m "chore(web): update production image tag to ${{ inputs.sha }}"
            git pull --rebase origin main
            git push
          else
            echo "No changes to manifests."
          fi
