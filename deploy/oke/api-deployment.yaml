apiVersion: apps/v1
kind: Deployment
metadata:
  name: ott-api
  namespace: ott
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ott-api
  template:
    metadata:
      labels:
        app: ott-api
    spec:
      serviceAccountName: ott-api
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: api
          image: yny.ocir.io/axvqyylkrvmi/ott-api:8d5fa4928b13e55d145b4f1c876fd6beb904a05a
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "8d5fa49"
            - name: TELEGRAM_NOTIFY_ENABLED
              value: "true"
            - name: TELEGRAM_SERVICE_NAME
              value: "ottline"
            - name: CF_REQUEST_HOST
              value: "ottline.app"
          envFrom:
            - secretRef:
                name: ott-api-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ott-api
  namespace: ott
spec:
  selector:
    app: ott-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
