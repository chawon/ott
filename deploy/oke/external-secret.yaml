apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: oci-vault-store
  namespace: ott
spec:
  provider:
    oracle:
      vault: ocid1.vault.oc1.ap-chuncheon-1.gju4rwlyaactq.ab4w4ljrq6aokzb5yl3ofvmjtphfwyulzdsksw2wujzyxi2gfv23zed6hlaq
      region: ap-chuncheon-1
      auth:
        # 워커 노드의 Dynamic Group 권한(Principal)을 사용하여 인증합니다.
        # 별도의 Access Key가 필요하지 않아 보안상 가장 안전합니다.
        iamType: InstancePrincipal
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ott-api-secrets
  namespace: ott
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    name: ott-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: DB_URL
    - secretKey: DB_USER
      remoteRef:
        key: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: DB_PASSWORD
    - secretKey: TMDB_ACCESS_TOKEN
      remoteRef:
        key: TMDB_ACCESS_TOKEN
    - secretKey: NAVER_CLIENT_ID
      remoteRef:
        key: NAVER_CLIENT_ID
    - secretKey: NAVER_CLIENT_SECRET
      remoteRef:
        key: NAVER_CLIENT_SECRET
    - secretKey: ADMIN_ANALYTICS_TOKEN
      remoteRef:
        key: ADMIN_ANALYTICS_TOKEN
    - secretKey: TELEGRAM_NOTIFY_ENABLED
      remoteRef:
        key: TELEGRAM_NOTIFY_ENABLED
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: TELEGRAM_CHAT_ID
    - secretKey: TELEGRAM_SERVICE_NAME
      remoteRef:
        key: TELEGRAM_SERVICE_NAME
    - secretKey: CF_API_TOKEN
      remoteRef:
        key: CF_API_TOKEN
    - secretKey: CF_ZONE_ID
      remoteRef:
        key: CF_ZONE_ID
    - secretKey: CF_ACCOUNT_TAG
      remoteRef:
        key: CF_ACCOUNT_TAG
    - secretKey: CF_REQUEST_HOST
      remoteRef:
        key: CF_REQUEST_HOST
    - secretKey: GA4_PROPERTY_ID
      remoteRef:
        key: GA4_PROPERTY_ID
    - secretKey: GA4_CREDENTIALS_JSON
      remoteRef:
        key: GA4_CREDENTIALS_JSON
