server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/watchlog}
    username: ${DB_USER:watchlog}
    password: ${DB_PASSWORD:watchlog}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

info:
  app:
    version: ${APP_VERSION:dev}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

tmdb:
  base-url: https://api.themoviedb.org/3
  access-token: ${TMDB_ACCESS_TOKEN:}
  language: ko-KR
  image-size: w342

naver:
  base-url: https://openapi.naver.com
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}

notify:
  telegram:
    enabled: ${TELEGRAM_NOTIFY_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
    base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}
    service-name: ${TELEGRAM_SERVICE_NAME:ottline}

admin:
  analytics:
    token: ${ADMIN_ANALYTICS_TOKEN:}
  feedback:
    token: ${ADMIN_FEEDBACK_TOKEN:${ADMIN_ANALYTICS_TOKEN:}}

cloudflare:
  api-token: ${CF_API_TOKEN:}
  zone-id: ${CF_ZONE_ID:}
  account-tag: ${CF_ACCOUNT_TAG:}
  request-host: ${CF_REQUEST_HOST:}

google-analytics:
  property-id: ${GA4_PROPERTY_ID:}
  credentials-json: ${GA4_CREDENTIALS_JSON:}

report:
  schedule: "0 0 0 * * *"

llm:
  anthropic-api-key: ${ANTHROPIC_API_KEY:}
  anthropic-model: ${ANTHROPIC_MODEL:claude-opus-4-5}
  gemini-api-key: ${GEMINI_API_KEY:}
  gemini-model: ${GEMINI_MODEL:gemini-2.5-flash}
