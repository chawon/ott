<html lang="ko">
  <head>

    <title>ottline</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">ottline</p>
      <h1 class="title">현재 페이지를 기록으로 보내기</h1>

        지원하는 OTT 작품 페이지에서 제목을 읽어와 QuickLog 검색어로 채웁니다.
      </p>

      <section class="card" id="card">
        <p class="label">상태</p>
        <p class="value" id="status">현재 탭을 확인하는 중…</p>
      </section>

      <button class="cta" id="openButton" type="button" disabled>
        ottline에서 기록 시작
      </button>
    </main>
    <script src="./popup.js"></script>
