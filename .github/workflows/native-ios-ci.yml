name: Native iOS CI

on:
  pull_request:
    paths:
      - "apps/native/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/native-ios-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "apps/native/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/native-ios-ci.yml"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck native app
        run: npm run native:typecheck

      - name: Test native app
        run: npm run native:test

      - name: Expo doctor
        working-directory: apps/native
        run: npx expo-doctor
