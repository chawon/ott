apiVersion: apps/v1
kind: Deployment
metadata:
  name: ott-web
  namespace: ott-staging
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: ott-web
  template:
    metadata:
      labels:
        app: ott-web
    spec:
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: web
          env:
            - name: APP_ENV
              value: staging
            - name: APP_VERSION
              value: "staging-dcf68c7"
          image: yny.ocir.io/axvqyylkrvmi/ott-web:staging-dcf68c71ff4fc17bdd6258e22812237254f06b54
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ott-web-config
            - secretRef:
                name: ott-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ott-web
  namespace: ott-staging
spec:
  selector:
    app: ott-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
