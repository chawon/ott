apiVersion: v1
kind: ServiceAccount
metadata:
  name: ott-api
  namespace: ott-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ott-api-report-reader
  namespace: ott-staging
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ott-api-report-reader-binding
  namespace: ott-staging
subjects:
  - kind: ServiceAccount
    name: ott-api
    namespace: ott-staging
roleRef:
  kind: Role
  name: ott-api-report-reader
  apiGroup: rbac.authorization.k8s.io
