apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: oci-vault-store
  namespace: ott-staging
spec:
  provider:
    oracle:
      vault: ocid1.vault.oc1.ap-chuncheon-1.gju4rwlyaactq.ab4w4ljrq6aokzb5yl3ofvmjtphfwyulzdsksw2wujzyxi2gfv23zed6hlaq
      region: ap-chuncheon-1
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ott-api-secrets
  namespace: ott-staging
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    name: ott-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: STAGING_DB_URL
    - secretKey: DB_USER
      remoteRef:
        key: STAGING_DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: STAGING_DB_PASSWORD
    - secretKey: TMDB_ACCESS_TOKEN
      remoteRef:
        key: TMDB_ACCESS_TOKEN
    - secretKey: NAVER_CLIENT_ID
      remoteRef:
        key: NAVER_CLIENT_ID
    - secretKey: NAVER_CLIENT_SECRET
      remoteRef:
        key: NAVER_CLIENT_SECRET
    - secretKey: ADMIN_ANALYTICS_TOKEN
      remoteRef:
        key: STAGING_ADMIN_ANALYTICS_TOKEN
    - secretKey: CF_API_TOKEN
      remoteRef:
        key: CF_API_TOKEN
    - secretKey: CF_ZONE_ID
      remoteRef:
        key: CF_ZONE_ID
    - secretKey: CF_ACCOUNT_ID
      remoteRef:
        key: CF_ACCOUNT_TAG
    - secretKey: GA4_PROPERTY_ID
      remoteRef:
        key: GA4_PROPERTY_ID
    - secretKey: GA4_CREDENTIALS_JSON
      remoteRef:
        key: GA4_CREDENTIALS_JSON
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ANTHROPIC_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
    - secretKey: CHATGPT_APP_SECRET
      remoteRef:
        key: STAGING_CHATGPT_APP_SECRET
    - secretKey: CHATGPT_OAUTH_ISSUER
      remoteRef:
        key: STAGING_CHATGPT_OAUTH_ISSUER
    - secretKey: CHATGPT_RESOURCE_SERVER_URL
      remoteRef:
        key: STAGING_CHATGPT_RESOURCE_SERVER_URL
    - secretKey: CHATGPT_RESOURCE_DOCUMENTATION_URL
      remoteRef:
        key: STAGING_CHATGPT_RESOURCE_DOCUMENTATION_URL
    - secretKey: CHATGPT_REVIEW_USERNAME
      remoteRef:
        key: STAGING_CHATGPT_REVIEW_USERNAME
    - secretKey: CHATGPT_REVIEW_PASSWORD
      remoteRef:
        key: STAGING_CHATGPT_REVIEW_PASSWORD
    - secretKey: CHATGPT_REVIEW_PAIRING_CODE
      remoteRef:
        key: STAGING_CHATGPT_REVIEW_PAIRING_CODE
