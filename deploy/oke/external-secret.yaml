apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: oci-vault-store
  namespace: ott
spec:
  provider:
    oracle:
      vault: ocid1.vault.oc1.ap-chuncheon-1.gju4rwlyaactq.ab4w4ljrq6aokzb5yl3ofvmjtphfwyulzdsksw2wujzyxi2gfv23zed6hlaq
      region: ap-chuncheon-1
      # auth 블록 생략 시 워커 노드 Instance Principal로 자동 인증
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ott-api-secrets
  namespace: ott
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    name: ott-api-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_URL
      remoteRef:
        key: DB_URL
    - secretKey: DB_USER
      remoteRef:
        key: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: DB_PASSWORD
    - secretKey: TMDB_ACCESS_TOKEN
      remoteRef:
        key: TMDB_ACCESS_TOKEN
    - secretKey: NAVER_CLIENT_ID
      remoteRef:
        key: NAVER_CLIENT_ID
    - secretKey: NAVER_CLIENT_SECRET
      remoteRef:
        key: NAVER_CLIENT_SECRET
    - secretKey: ADMIN_ANALYTICS_TOKEN
      remoteRef:
        key: ADMIN_ANALYTICS_TOKEN
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: TELEGRAM_BOT_TOKEN
    - secretKey: TELEGRAM_CHAT_ID
      remoteRef:
        key: TELEGRAM_CHAT_ID
    - secretKey: CF_API_TOKEN
      remoteRef:
        key: CF_API_TOKEN
    - secretKey: CF_ZONE_ID
      remoteRef:
        key: CF_ZONE_ID
    - secretKey: CF_ACCOUNT_TAG
      remoteRef:
        key: CF_ACCOUNT_TAG
    - secretKey: GA4_PROPERTY_ID
      remoteRef:
        key: GA4_PROPERTY_ID
    - secretKey: GA4_CREDENTIALS_JSON
      remoteRef:
        key: GA4_CREDENTIALS_JSON
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ANTHROPIC_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
